<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dev Toolbox — A free, offline-ready collection of essential developer utilities. JSON formatter, Base64, UUID, color converter, and more.">
  <meta name="keywords" content="dev tools, JSON formatter, Base64, UUID generator, developer utilities, color converter, hash generator">
  <title>Dev Toolbox — Essential Developer Utilities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated mesh background -->
  <div class="mesh-bg" aria-hidden="true">
    <div class="mesh mesh-1"></div>
    <div class="mesh mesh-2"></div>
    <div class="mesh mesh-3"></div>
  </div>

  <!-- Header -->
  <header id="app-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <h1>Dev <span class="accent">Toolbox</span></h1>
      </div>
      <div class="header-actions">
        <span class="tool-count" id="tool-count">8 Tools</span>
        <a href="https://github.com" target="_blank" rel="noopener" class="btn-gh" title="GitHub">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main id="main-content">
    <!-- Hero / Search -->
    <section class="hero">
      <h2 class="hero-title">All the tools you need,<br><span class="accent">in one place.</span></h2>
      <p class="hero-sub">No install. No signup. No tracking. Just open and use.</p>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 20 20" width="18" height="18" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        <input type="text" id="search-input" placeholder="Search tools... (e.g. json, base64, uuid)" autocomplete="off">
      </div>
    </section>

    <!-- Tools Grid -->
    <section class="tools-section">
      <div class="tools-grid" id="tools-grid">
        <!-- Cards rendered by JS -->
      </div>
    </section>

    <!-- Tool Modal / Workspace -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal">
        <div class="modal-header">
          <div class="modal-title-area">
            <span class="modal-icon" id="modal-icon"></span>
            <div>
              <h3 id="modal-title">Tool</h3>
              <p id="modal-desc" class="modal-desc"></p>
            </div>
          </div>
          <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body">
          <!-- Tool content injected by JS -->
        </div>
      </div>
    </div>
  </main>

  <footer id="app-footer">
    <p>Open Source & Free Forever</p>
    <p class="footer-sub">Dev Toolbox &bull; No dependencies &bull; 100% client-side &bull; MIT License</p>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toast-msg">✅ Done!</span></div>

  <script src="script.js"></script>
</body>
</html>
